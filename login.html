<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Palawan Connect</title>
<link rel="stylesheet" href="login.css">
</head>
<body>
<div class="login-container">
  <div class="login-box">
    <img src="M-LOGO.png" alt="Logo" class="login-logo" onerror="this.style.display='none'">
    <h1>Palawan Connect</h1>
    <p class="subtitle">Sign in or create an account</p>
    <div id="networkBadge" class="network-badge online">🟢 Online</div>

    <!-- Tabs -->
    <div class="tabs">
      <button id="loginTab" class="tab active" onclick="showTab('login')">Sign In</button>
      <button id="registerTab" class="tab" onclick="showTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <input type="text" id="loginUsername" placeholder=" " required>
          <label>Username</label>
        </div>
        <div class="form-group">
          <input type="password" id="loginPassword" placeholder=" " required>
          <label>Password</label>
        </div>
        <p class="error-msg" id="loginError"></p>
        <button type="submit" class="login-btn">Sign In</button>
      </form>
    </div>

    <!-- Register Form -->
    <div id="registerForm" style="display:none">
      <form onsubmit="handleRegister(event)">
        <div class="form-group">
          <input type="text" id="regUsername" placeholder=" " required>
          <label>Username</label>
        </div>
        <div class="form-group">
          <input type="password" id="regPassword" placeholder=" " required>
          <label>Password</label>
        </div>
        <div class="form-group">
          <input type="password" id="regConfirm" placeholder=" " required>
          <label>Confirm Password</label>
        </div>
        <p class="error-msg" id="registerError"></p>
        <button type="submit" class="login-btn">Create Account</button>
      </form>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="offline-store.js"></script>
<script src="login.js"></script>
</body>
</html>
